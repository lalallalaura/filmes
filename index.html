<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#inicio">Meu Portfólio</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
      ☰
    </button>

    <div class="collapse navbar-collapse" id="menuNavbar">
      <ul class="navbar-nav ms-auto text-center">
        <li class="nav-item"><a class="nav-link" href="#inicio">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="#projetos">Projetos</a></li>
        <li class="nav-item"><a class="nav-link" href="#sobre">Sobre</a></li>
        <li class="nav-item"><a class="nav-link" href="#contato">Contato</a></li>
      </ul>

      <button id="themeToggle" class="btn btn-sm ms-3">🌙</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="inicio" class="hero">
  <div class="hero-glow"></div>

  <div class="container text-center">
    <h1 class="titulo fade-in">Lalalaura</h1>
    <p class="subtitle fade-in">Front-end developer • UI lover</p>
  </div>
</section>

<!-- PROJETOS -->
<section id="projetos" class="container mt-5">
  <h2 class="text-center mb-4 fade-in">Projetos</h2>

  <!-- SLIDER -->
  <div id="slider" class="carousel slide mb-5 fade-in" data-bs-ride="carousel">

    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://i.postimg.cc/1zT9KY9N/1.png" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="https://i.postimg.cc/nFgzKMz1/3.png" class="d-block w-100">
      </div>
    </div>

    <!-- CONTROLES -->
    <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <!-- CARDS -->
  <div class="row g-4">

    <div class="col-md-4 fade-in">
      <div class="card h-100">
        <img src="https://i.postimg.cc/1zT9KY9N/1.png" class="card-img-top">
        <div class="card-body">
          <h3>Projeto 1</h3>
          <p>Descrição.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4 fade-in">
      <div class="card h-100">
        <img src="https://i.postimg.cc/nFgzKMz1/3.png" class="card-img-top">
        <div class="card-body">
          <h3>Projeto 2</h3>
          <p>Descrição.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4 fade-in">
      <div class="card h-100">
        <img src="https://i.postimg.cc/Fr8Rb1Rp/2.png" class="card-img-top">
        <div class="card-body">
          <h3>Projeto 3</h3>
          <p>Descrição.</p>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- SOBRE -->
<section id="sobre" class="container mt-5 fade-in">
  <h2 class="section-title">Sobre</h2>

  <div class="sobre-card">
    <p>Front-end apaixonada por UI ✨</p>
  </div>
</section>

<!-- FOOTER -->
<footer id="contato" class="footer mt-5">
  <div class="container">
    <div class="contact-card">
      <h2>Contato</h2>
      <a href="#" class="contact-btn">Email</a>
    </div>
  </div>
</footer>

<!-- JS -->
<script>
/* NAVBAR */
window.addEventListener("scroll", () => {
  document.querySelector(".navbar")
    .classList.toggle("scrolled", window.scrollY > 50);
});

/* FADE */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("show");
  });
},{threshold:0.15});

document.querySelectorAll(".fade-in").forEach(el=>{
  observer.observe(el);
});

/* DARK MODE */
const btn = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
  btn.textContent="☀️";
}

btn.onclick = ()=>{
  document.body.classList.toggle("light");

  if(document.body.classList.contains("light")){
    localStorage.setItem("theme","light");
    btn.textContent="☀️";
  } else {
    localStorage.setItem("theme","dark");
    btn.textContent="🌙";
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
